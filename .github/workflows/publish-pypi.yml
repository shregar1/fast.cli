# Build and upload to PyPI using an API token (repository secret).
#
# Setup:
# 1. PyPI → Account settings → API tokens → Create a token for this project (or whole account).
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret:
#    Name:  PYPI_API_TOKEN
#    Value: the token string (starts with pypi-)
# 3. Bump __version__ in fast_cli/__init__.py, then tag and push:
#    git tag v1.5.1 && git push origin v1.5.1

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
